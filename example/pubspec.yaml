name: flutter_music_picker_example
description: "Demonstrates how to use the flutter_music_picker plugin."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.8.1 <4.0.0"
  flutter: ">=3.32.7 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # The flutter_music_picker plugin being demonstrated
  flutter_music_picker:
    path: ../

  # Audio playback for the music player in the example
  just_audio: ^0.9.42

  # Runtime permission handling for Android and iOS
  permission_handler: ^11.4.0

  # Path provider for platform-specific file access
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
